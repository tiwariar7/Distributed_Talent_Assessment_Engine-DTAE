version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dtae}
      POSTGRES_USER: ${POSTGRES_USER:-dtae}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dtae_secret}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dtae}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dtae-network

  couchdb:
    image: couchdb:3.3
    environment:
      COUCHDB_USER: ${COUCHDB_USER:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-dtae_secret}
    volumes:
      - couchdb_prod_data:/opt/couchdb/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5984/_up" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - dtae-network

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dtae-network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dtae-network

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - minio_prod_data:/data
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dtae-network

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - POST=1
      - DELETE=1
    networks:
      - dtae-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: [ "sh", "-c", "python manage.py migrate && python manage.py bootstrap_couchdb && python manage.py seed_demo_data && daphne -b 0.0.0.0 -p 8000 config.asgi:application" ]
    environment:
      - DJANGO_DEBUG=True
      - POSTGRES_HOST=postgres
      - COUCHDB_URL=http://admin:dtae_secret@couchdb:5984
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - DOCKER_HOST=tcp://docker-proxy:2375
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_secret
    volumes:
      - ./backend:/app
      - ./scratch:/app/scratch
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      couchdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    networks:
      - dtae-network
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A config worker -l info
    environment:
      - DJANGO_DEBUG=True
      - POSTGRES_HOST=postgres
      - COUCHDB_URL=http://admin:dtae_secret@couchdb:5984
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - DOCKER_HOST=tcp://docker-proxy:2375
      - MINIO_ENDPOINT_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minio_admin
      - MINIO_SECRET_KEY=minio_secret
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      couchdb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    networks:
      - dtae-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - dtae-network

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - dtae-network

volumes:
  postgres_prod_data:
  couchdb_prod_data:
  minio_prod_data:

networks:
  dtae-network:
    name: dtae_network
    driver: bridge
