name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: dtae
          POSTGRES_USER: dtae
          POSTGRES_PASSWORD: dtae_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dtae"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      couchdb:
        image: couchdb:3.3
        env:
          COUCHDB_USER: admin
          COUCHDB_PASSWORD: dtae_secret
        ports:
          - 5984:5984

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          COUCHDB_URL: http://admin:dtae_secret@localhost:5984
        run: |
          python manage.py migrate

      - name: Run Tests
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          REDIS_CACHE_URL: redis://localhost:6379/1
          COUCHDB_URL: http://localhost:5984
        run: |
          pytest
