apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-api
  namespace: dtae
  labels:
    app: django-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: django-api
  template:
    metadata:
      labels:
        app: django-api
    spec:
      containers:
        - name: api
          image: dtae/api:latest
          command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
          env:
            - name: DJANGO_DEBUG
              value: "False"
            - name: POSTGRES_DB
              value: dtae
            - name: POSTGRES_USER
              value: dtae
            - name: POSTGRES_PASSWORD
              value: dtae_secret
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: COUCHDB_URL
              value: http://couchdb:5984
            - name: COUCHDB_USER
              value: admin
            - name: COUCHDB_PASSWORD
              value: dtae_secret
            - name: COUCHDB_DATABASE
              value: dtae_documents
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: REDIS_CACHE_URL
              value: redis://redis:6379/1
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672//
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ACCESS_KEY
              value: minioadmin
            - name: MINIO_SECRET_KEY
              value: minioadmin
            - name: MINIO_BUCKET_NAME
              value: dtae-logs
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/v1/health/readiness/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: django-api
  namespace: dtae
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: django-api
