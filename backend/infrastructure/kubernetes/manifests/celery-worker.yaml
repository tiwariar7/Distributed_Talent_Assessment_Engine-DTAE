apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker-python
  namespace: dtae
  labels:
    app: celery-worker
    language: python
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
      language: python
  template:
    metadata:
      labels:
        app: celery-worker
        language: python
    spec:
      containers:
        - name: worker
          image: dtae/api:latest
          command: ["celery", "-A", "config", "worker", "-Q", "lang_python,high_priority,medium_priority,low_priority,maintenance", "-l", "info", "-n", "python-worker@%h"]
          env:
            - name: DJANGO_DEBUG
              value: "False"
            - name: POSTGRES_DB
              value: dtae
            - name: POSTGRES_USER
              value: dtae
            - name: POSTGRES_PASSWORD
              value: dtae_secret
            - name: POSTGRES_HOST
              value: postgres
            - name: POSTGRES_PORT
              value: "5432"
            - name: COUCHDB_URL
              value: http://couchdb:5984
            - name: COUCHDB_USER
              value: admin
            - name: COUCHDB_PASSWORD
              value: dtae_secret
            - name: COUCHDB_DATABASE
              value: dtae_documents
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: REDIS_CACHE_URL
              value: redis://redis:6379/1
            - name: RABBITMQ_URL
              value: amqp://guest:guest@rabbitmq:5672//
            - name: MINIO_ENDPOINT
              value: minio:9000
            - name: MINIO_ACCESS_KEY
              value: minioadmin
            - name: MINIO_SECRET_KEY
              value: minioadmin
            - name: MINIO_BUCKET_NAME
              value: dtae-logs
          volumeMounts:
            - name: docker-socket
              mountPath: /var/run/docker.sock
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
---
