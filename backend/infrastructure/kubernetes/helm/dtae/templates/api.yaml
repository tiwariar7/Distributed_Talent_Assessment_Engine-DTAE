apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dtae.fullname" . }}-api
  labels:
    {{- include "dtae.labels" . | nindent 4 }}
    app: django-api
spec:
  replicas: {{ .Values.replicaCount.api }}
  selector:
    matchLabels:
      app: django-api
  template:
    metadata:
      labels:
        app: django-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
          env:
            - name: DJANGO_DEBUG
              value: "False"
            - name: POSTGRES_DB
              value: {{ .Values.postgres.db | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.password | quote }}
            - name: POSTGRES_HOST
              value: "postgres"
            - name: POSTGRES_PORT
              value: "5432"
            - name: COUCHDB_URL
              value: "http://couchdb:5984"
            - name: COUCHDB_USER
              value: {{ .Values.couchdb.user | quote }}
            - name: COUCHDB_PASSWORD
              value: {{ .Values.couchdb.password | quote }}
            - name: COUCHDB_DATABASE
              value: {{ .Values.couchdb.db | quote }}
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: REDIS_CACHE_URL
              value: "redis://redis:6379/1"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672//"
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY
              value: {{ .Values.minio.accessKey | quote }}
            - name: MINIO_SECRET_KEY
              value: {{ .Values.minio.secretKey | quote }}
            - name: MINIO_BUCKET_NAME
              value: {{ .Values.minio.bucketName | quote }}
          ports:
            - containerPort: 8000
              name: http
          resources:
            {{- toYaml .Values.resources.api | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/v1/health/readiness/
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness/
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: django-api
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: django-api
