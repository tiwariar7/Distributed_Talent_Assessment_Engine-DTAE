apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dtae.fullname" . }}-redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
